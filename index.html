<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>উইলসহিত্য ক্লাব | শব্দের ক্যানভাসে স্বপ্নের বুনন</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&family=Anek+Bangla:wght@300;500;700&display=swap');

        :root {
            --paper-bg: #EAE3D2;
            --paper-light: #F4EFE6;
            --ink-black: #2C2825;
            --ink-red: #8B1E0B;
            --border-brown: #A68A61;
        }

        /* গ্লোবাল সেন্টারিং ও ৭৫% স্কেল */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--paper-bg);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        body {
            transform: scale(0.75);
            transform-origin: center center;
            position: relative;
            font-family: 'Tiro Bangla', serif;
        }

        /* ব্যাকগ্রাউন্ড টেক্সচার */
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background: url('https://www.transparenttextures.com/patterns/rice-paper-2.png');
            opacity: 0.5; z-index: -2; pointer-events: none;
        }

        /* পাণ্ডুলিপি কার্ড ডিজাইন */
        .manuscript-card {
            background: linear-gradient(145deg, var(--paper-light) 0%, #E8DFCA 100%);
            width: 600px; height: 860px;
            position: relative;
            box-shadow: 0 40px 100px rgba(44, 40, 37, 0.3), 
                        inset 0 0 100px rgba(166, 138, 97, 0.15);
            border: 1px solid var(--border-brown);
            padding: 50px 40px;
            display: flex; flex-direction: column; justify-content: space-between;
            text-align: center; z-index: 10;
        }

        /* লোগো সেকশন */
        .logo-box {
            width: 160px;
            height: auto;
            margin: 0 auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
            transition: transform 0.4s ease;
        }

        .logo-box:hover { transform: scale(1.05); }

        /* টাইপোগ্রাফি */
        .established { font-family: 'Anek Bangla', sans-serif; font-size: 13px; color: #888; letter-spacing: 2px; }
        .main-title { font-size: 62px; color: var(--ink-black); margin: 5px 0; }
        .ink-red { color: var(--ink-red); }
        .tagline { font-size: 20px; font-style: italic; color: #5C4A3D; margin-bottom: 20px; }

        /* কন্টেন্ট বক্স */
        .content-box { border: 1px dashed var(--border-brown); padding: 40px 25px; margin-top: 10px; }
        .status-text { font-size: 34px; color: var(--ink-red); margin-bottom: 15px; }
        .description { font-family: 'Anek Bangla', sans-serif; font-size: 15px; line-height: 2; color: #333; }

        /* ফুটার লজিক */
        .ink-line { width: 180px; height: 2px; background: rgba(139, 30, 11, 0.2); margin: 20px auto 10px; position: relative; overflow: hidden; }
        .ink-fill { position: absolute; left: 0; top: 0; height: 100%; width: 40%; background: var(--ink-red); animation: flow 3s infinite linear; }

        @keyframes flow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }

        .studio-credit { font-family: 'Anek Bangla', sans-serif; font-size: 10px; color: #aaa; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="manuscript-card">
        <header>
            <p class="established">স্থাপিত ২০২৪</p>
            
            <img src="assets/logo.png" alt="উইলস সাহিত্য ক্লাব লোগো" class="logo-box">
            
            <h1 class="main-title">উইলস সাহিত্য <span class="ink-red">ক্লাব</span></h1>
            <p style="font-size: 28px; margin-bottom: 5px;">✒️</p>
            <p class="tagline">"শব্দের ক্যানভাসে স্বপ্নের বুনন"</p>
        </header>

        <main class="content-box">
            <h2 class="status-text">আসিতেছে...</h2>
            <p class="description">
                আমাদের সাহিত্য কাননটি সাজানো হচ্ছে। পুরনো দিনের সেই কালির গন্ধ আর নতুন ভাবনার মেলবন্ধন নিয়ে খুব শীঘ্রই আমরা উন্মুক্ত করছি আমাদের নতুন পাতা। অপেক্ষা করুন এক নতুন ভোরের।
            </p>
        </main>

        <footer>
            <div class="ink-line"><div class="ink-fill"></div></div>
            <p class="studio-credit">BUILT BY <span style="color: var(--ink-red); font-weight: bold;">RELAX STUDIO</span></p>
        </footer>
    </div>

</body>
</html>
